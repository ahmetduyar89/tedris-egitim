<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>TEDRİS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            poppins: ['Poppins', 'sans-serif'],
          },
          colors: {
            // Primary Purple/Blue Theme
            'primary': '#6366f1',          // Indigo
            'primary-dark': '#4f46e5',     // Darker Indigo
            'primary-light': '#818cf8',    // Light Indigo
            'secondary': '#3b82f6',        // Blue
            'accent': '#8b5cf6',           // Purple
            'accent-pink': '#ec4899',      // Pink

            // Status Colors
            'success': '#10B981',
            'warning': '#F59E0B',
            'error': '#EF4444',
            'info': '#3b82f6',

            // Neutral Colors
            'background': '#f9fafb',
            'card-background': '#FFFFFF',
            'text-primary': '#111827',
            'text-secondary': '#6B7280',
            'border': '#e5e7eb',
            'border-light': '#f3f4f6',
          },
          borderRadius: {
            'lg': '0.75rem',
            'xl': '1rem',
            '2xl': '1.5rem',
          },
          boxShadow: {
            'sm': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
            'md': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
            'lg': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
            'xl': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
            '2xl': '0 25px 50px -12px rgba(0, 0, 0, 0.25)',
            'primary': '0px 4px 12px rgba(99, 102, 241, 0.25)',
            'secondary': '0px 4px 12px rgba(59, 130, 246, 0.25)',
            'accent': '0px 4px 12px rgba(139, 92, 246, 0.25)',
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'fade-in-down': 'fadeInDown 0.3s ease-out',
            'fade-in-up': 'fadeInUp 0.3s ease-out',
            'fade-in-right': 'fadeInRight 0.3s ease-out',
            'blob': 'blob 7s infinite',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
            fadeInDown: { '0%': { opacity: 0, transform: 'translateY(-10px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            fadeInUp: { '0%': { opacity: 0, transform: 'translateY(10px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            fadeInRight: { '0%': { opacity: 0, transform: 'translateX(20px)' }, '100%': { opacity: 1, transform: 'translateX(0)' } },
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' }
            },
          },
        }
      }
    }
  </script>


  <!-- Firebase SDKs (Moved to Head for correct loading order) -->
  <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>

  <!-- Jitsi Meet API -->
  <script src='https://meet.jit.si/external_api.js'></script>
</head>

  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
